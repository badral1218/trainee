<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Fetch Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            line-height: 1.5;
        }

        .app {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .panel {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            background: #fff;
        }

        .status {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        ul {
            padding-left: 1.2rem;
        }
    </style>
</head>
<body>
    <h1>Users</h1>
    <div class="app">
        <section class="panel">
            <h2>Users List</h2>
            <div id="status" class="status loading">Loading users...</div>
            <ul id="users-list"></ul>
        </section>

        <aside class="panel">
            <h2>Error Case</h2>
            <div id="error-status" class="status error">Request failed</div>
            <p id="error-message">The request is intentionally failing all the time.</p>
        </aside>
    </div>

    <script type="module" src="fetch-api.js"></script>
    <script type="module" src="fetch-api-fail.js"></script>
</body>
</html>
